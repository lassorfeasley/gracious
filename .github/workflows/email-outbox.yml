name: Drain email outbox

# Timely retries for the email outbox on Vercel Hobby, where cron only fires
# once per day. GitHub's minimum schedule is 5 minutes and runs are best-effort
# (they can be delayed or skipped under load), which is fine here: the after()
# hook handles the happy path and the daily Vercel cron is the guaranteed
# backstop — this just shortens the retry window for transient failures.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   APP_URL     e.g. https://your-app.vercel.app  (no trailing slash)
#   CRON_SECRET must match the CRON_SECRET env var in your Vercel project

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

# If a run overruns the 5-minute cadence, skip the overlap rather than pile up.
concurrency:
  group: email-outbox
  cancel-in-progress: false

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping outbox drainer
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "APP_URL and CRON_SECRET repository secrets must be set." >&2
            exit 1
          fi
          status=$(curl -sS -o /tmp/body.json -w '%{http_code}' \
            --max-time 60 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cron/email-outbox")
          echo "HTTP $status"
          cat /tmp/body.json || true
          echo
          if [ "$status" != "200" ]; then
            echo "Outbox drain failed with HTTP $status" >&2
            exit 1
          fi
